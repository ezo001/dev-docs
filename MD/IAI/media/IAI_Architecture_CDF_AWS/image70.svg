<svg width="1460" height="633" viewBox="0 0 1460 633" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><defs></defs><g><rect x="570.5" y="5" width="305" height="27.6094" id="_title" fill="none"/><text font-family="Arial" font-weight="700" font-size="14" x="575.5" y="24.5332">AOT People Management Context diagram</text><g id="elem_PMConfigurator"><rect x="7" y="45.6094" rx="2.5" ry="2.5" width="218" height="178.688" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="92" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="36.5" y="120.219">People Management</text><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="67.5" y="140.344">Configurator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="114" y="158.393"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="17" y="176.002">IT Administrator with knowledge</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="21.5" y="193.611">on who needs access to what</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="58" y="211.221">features and data.</text></g><g id="elem_PM"><rect x="643" y="316.609" rx="2.5" ry="2.5" width="218" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#81006F"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="656" y="343.219">AOT People Management</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="750" y="361.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="673" y="378.877">Manages AOT roles and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="653" y="396.486">departments and assigns them</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="670.5" y="414.096">to users and user groups.</text></g><g id="elem_IDProvider"><rect x="525.5" y="534.609" rx="2.5" ry="2.5" width="213" height="92.9531" stroke="#8A8A8A" stroke-width="0.5" fill="#999999"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="569.5" y="561.219">Identity Provider</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="630" y="579.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="535.5" y="596.877">Facilitates user authentication</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="543" y="614.486">across the entire enterprise.</text></g><g id="elem_OH"><rect x="260.5" y="79.6094" rx="2.5" ry="2.5" width="219" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#BD0000"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="270.5" y="106.219">AOT Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="368" y="124.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="274.5" y="141.877">Displays operations hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="276.5" y="159.486">and provides details for each</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="303" y="177.096">node in the hierarchy</text></g><g id="elem_smartKPIs"><rect x="515" y="71.1094" rx="2.5" ry="2.5" width="220" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#6F8100"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="564" y="97.7188">AOT Smart KPIs</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="623" y="115.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="526.5" y="133.377">Allows users to view KPIs about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="525" y="150.986">their Operations configured into</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="532" y="168.596">a hierarchy, to drill down and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="587.5" y="186.205">do analysis.</text></g><g id="elem_IA"><rect x="770" y="79.6094" rx="2.5" ry="2.5" width="220" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#00B1CD"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="793" y="106.219">AOT Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="878" y="124.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="807" y="141.877">Creates insigths about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="780" y="159.486">business operations and makes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="802.5" y="177.096">them available for users.</text></g><g id="elem_3DVisualizer"><rect x="1025" y="71.1094" rx="2.5" ry="2.5" width="188" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#313139"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="1050.5" y="97.7188">AOT 3D Visualizer</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1117" y="115.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1036.5" y="133.377">Visualizes facilities and/or</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1035" y="150.986">processes in 3D providing</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1050.5" y="168.596">context data from the</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1065.5" y="186.205">Operations Twin.</text></g><g id="elem_reporting"><rect x="1248" y="97.6094" rx="2.5" ry="2.5" width="206" height="75.3438" stroke="#3C7FC0" stroke-width="0.5" fill="#87905C"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="1294.5" y="124.219">AOT Reporting</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1349" y="142.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1258" y="159.877">Reporting system within AOT.</text></g><g id="elem_messageBroker"><path d="M77