<svg width="1181" height="890" viewBox="0 0 1181 890" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><defs></defs><g><rect x="458" y="5" width="251" height="27.6094" id="_title" fill="none"/><text font-family="Arial" font-weight="700" font-size="14" x="463" y="24.5332">AOT 3D Visualizer Context diagram</text><g id="elem_operator"><rect x="414.5" y="45.6094" rx="2.5" ry="2.5" width="189" height="158.562" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="485" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="475.5" y="120.219">Operator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="507" y="138.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="424.5" y="155.877">A user from the enterprise</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="443" y="173.486">playing roles in daily</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="473.5" y="191.096">operations.</text></g><g id="elem_3DConfigurator"><rect x="639" y="45.6094" rx="2.5" ry="2.5" width="210" height="158.562" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="720" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="683" y="120.219">3D Configurator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="742" y="138.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="660.5" y="155.877">Subject matter expert who</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="649" y="173.486">configures and contextualizes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="696.5" y="191.096">the 3D models.</text></g><g id="elem_3DVisualizer"><rect x="532" y="311.609" rx="2.5" ry="2.5" width="188" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#313139"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="557.5" y="338.219">AOT 3D Visualizer</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="624" y="356.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="543.5" y="373.877">Visualizes facilities and/or</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="542" y="391.486">processes in 3D providing</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="557.5" y="409.096">context data from the</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="572.5" y="426.705">Operations Twin.</text></g><g id="elem_intelligentAdvisor"><rect x="7" y="585.109" rx="2.5" ry="2.5" width="220" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#00B1CD"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="30" y="611.719">AOT Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="115" y="629.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="44" y="647.377">Creates insigths about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="17" y="664.986">business operations and makes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="39.5" y="682.596">them available for users.</text></g><g id="elem_smartKPIs"><rect x="262" y="576.609" rx="2.5" ry="2.5" width="220" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#6F8100"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="311" y="603.219">AOT Smart KPIs</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="370" y="621.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="273.5" y="638.877">Allows users to view KPIs about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="272" y="656.486">their Operations configured into</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="279" y="674.096">a hierarchy, to drill down and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="334.5" y="691.705">do analysis.</text></g><g id="elem_peopleManagement"><rect x="517" y="585.109" rx="2.5" ry="2.5" width="218" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#81006F"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="530" y="611.719">AOT People Management</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="624" y="629.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="547" y="647.377">Manages AOT roles and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="527" y="664.986">departments and assigns them</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="544.5" y="682.596">to users and user groups.</text></g><g id="elem_OH"><rect x="770.5" y="585.109" rx="2.5" ry="2.5" width="219" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#BD0000"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="780.5" y="611.719">AOT Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="878" y="629.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="784.5" y="647.377">Displays operations hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="786.5" y="664.986">and provides details for each</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="813" y="682.596">node in the hierarchy</text></g><g id="elem_3DCE"><rect x="1025" y="594.109" rx="2.5" ry="2.5" width="150" height="92.9531" stroke="#8A8A8A" stroke-width="0.5" fill="#999999"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="1057.5" y="620.719">3DCE Core</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1098" y="638.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1039" y="656.377">3D models content</text><tex