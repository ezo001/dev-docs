<svg width="1399" height="736" viewBox="0 0 1399 736" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><defs></defs><g><rect x="537.75" y="5" width="310" height="27.6094" id="_title" fill="none"/><text font-family="Arial" font-weight="700" font-size="14" x="542.75" y="24.5332">AOT Operations Hierarchy Context diagram</text><g id="elem_operator"><rect x="7" y="55.6094" rx="2.5" ry="2.5" width="189" height="158.562" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="77.5" y="65.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="68" y="130.219">Operator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="99.5" y="148.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="17" y="165.877">A user from the enterprise</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="35.5" y="183.486">playing roles in daily</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="66" y="201.096">operations.</text></g><g id="elem_OHConfigurator"><rect x="231.5" y="45.6094" rx="2.5" ry="2.5" width="188" height="178.688" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="301.5" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="242.5" y="120.219">Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="277" y="140.344">Configurator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="323.5" y="158.393"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="242" y="176.002">Subject matter expert who</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="241.5" y="193.611">configures the Operations</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="293.5" y="211.221">Hierarchy.</text></g><g id="elem_OH"><rect x="582" y="381.609" rx="2.5" ry="2.5" width="219" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#BD0000"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="592" y="408.219">AOT Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="689.5" y="426.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="596" y="443.877">Displays operations hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="598" y="461.486">and provides details for each</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="624.5" y="479.096">node in the hierarchy</text></g><g id="elem_smartKPIs"><rect x="454.5" y="71.1094" rx="2.5" ry="2.5" width="220" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#6F8100"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="503.5" y="97.7188">AOT Smart KPIs</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="562.5" y="115.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="466" y="133.377">Allows users to view KPIs about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="464.5" y="150.986">their Operations configured into</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="471.5" y="168.596">a hierarchy, to drill down and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="527" y="186.205">do analysis.</text></g><g id="elem_IA"><rect x="709.5" y="79.6094" rx="2.5" ry="2.5" width="220" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#00B1CD"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="732.5" y="106.219">AOT Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="817.5" y="124.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="746.5" y="141.877">Creates insigths about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="719.5" y="159.486">business operations and makes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="742" y="177.096">them available for users.</text></g><g id="elem_3DVisualizer"><rect x="964.5" y="71.1094" rx="2.5" ry="2.5" width="188" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#313139"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="990" y="97.7188">AOT 3D Visualizer</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1056.5" y="115.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="976" y="133.377">Visualizes facilities and/or</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="974.5" y="150.986">processes in 3D providing</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="990" y="168.596">context data from the</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1005" y="186.205">Operations Twin.</text></g><g id="elem_PM"><rect x="582.5" y="619.609" rx="2.5" ry="2.5" width="218" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#81006F"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="595.5" y="646.219">AOT People Management</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="689.5" y="664.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="612.5" y="681.877">Manages AOT roles and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="592.5" y="699.486">departments and assigns them</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="610" y="717.096">to users and user groups.</text></g><g id="elem_reporting"><rect x="1187.5" y="97.6094" rx="2.5" ry="2.5" width="206" height="75.3438" stroke="#3C7FC0" stroke-width="0.5" fill="#87905C"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="1234" y="124.219">AOT Reporting</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1288.5" y="142.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1197.5" y="159.877">Reporting system within AOT.</text></g><g id="elem_DO"><rect x="180" y="346.609" rx="2.5" ry="2.5" width="219" height="181" stroke="#3C7FC0" stroke-width="0.5" fill="#4472C4"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="238" y="373.219">AOT DataOps</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="287.5" y="391.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="196.5" y="408.877">The DataOps system ingests</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="206.5" y="426.486">data from source systems</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="220.5" y="444.096">(ETL) and stores in a</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="190" y="461.705">knowledge graph. Furthermore,</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="199.5" y="479.315">it contains the infrastructure</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="190" y="496.924">and tooling for contextualization</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="266.5" y="514.533">as well.</text></g><g id="link_operator_OH"><path d="M144.97 214.979C169.21 251.589 202.75 292.299 243.5 316.609 310.51 356.589 340.76 327.819 416.5 346.609 468.67 359.549 525.3 377.319 573.53 393.619" id="operator-to-OH" stroke="#666666" fill="none"/><path d="M580.82 396.429 574.21 391.016 572.28 396.697 580.82 396.429Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="265" y="268.066">Views operations</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="244.5" y="283.16">hierachy, analyzes asset</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="244.5" y="298.254">related details and takes</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="293.5" y="313.348">actions.</text></g><g id="link_OHConfigurator_OH"><path d="M373.18 225.029C393.33 256.789 419 291.009 448.5 316.609 484.94 348.239 531.22 373.709 573.59 392.889" id="OHConfigurator-to-OH" stroke="#666666" fill="none"/><path d="M580.73 396.519 574.642 390.524 572.201 396.005 580.73 396.519Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="459" y="268.066">Configures Operations</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="472" y="283.16">hierarchy access,</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="449.5" y="298.254">mappings to UoM systems</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="469" y="313.348">and TimeZones etc.</text></g><g id="link_smartKPIs_OH"><path d="M587.13 199.299C600 234.189 616.84 278.119 633.5 316.609 641.6 335.309 651.01 355.339 659.88 373.559" id="smartKPIs-to-OH" stroke="#666666" fill="none"/><path d="M663.64 380.239 662.82 371.735 657.43 374.371 663.64 380.239Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="659" y="275.566">Retrieves asset</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="634.5" y="290.66">information to associate</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="683.5" y="305.754">to KPIs.</text></g><g id="link_3DVisualizer_OH"><path d="M1035.55 199.189C1019.02 237.279 993.46 284.499 958.5 316.609 916.51 355.169 860.01 382.889 809.8 401.859" id="3DVisualizer-to-OH" stroke="#666666" fill="none"/><path d="M802.47 404.949 811.014 404.976 808.925 399.352 802.47 404.949Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="1007.5" y="283.066">Retrieves asset hierarchy</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="1048" y="298.16">information.</text></g><g id="link_IA_OH"><path d="M813.83 190.939C808.56 227.739 798.67 276.619 780.5 316.609 771.38 336.669 758.48 356.619 745.32 374.299" id="IA-to-OH" stroke="#666666" fill="none"/><path d="M740.07 380.219 747.288 375.648 742.502 372.029 740.07 380.219Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="800.5" y="275.566">Retrieves asset hierarchy</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="807.5" y="290.66">to associate to insights</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="840.5" y="305.754">and actions.</text></g><g id="link_reporting_OH"><path d="M1274.83 172.869C1255.3 214.189 1217.98 280.239 1165.5 316.609 1059.43 390.119 912.12 418.469 809.99 429.359" id="reporting-to-OH" stroke="#666666" fill="none"/><path d="M802.18 430.269 810.448 432.425 809.826 426.457 802.18 430.269Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="1248.5" y="268.066">Retrieves asset</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="1224.5" y="283.16">information to be shown</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="1241" y="298.254">on the reports and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="1259" y="313.348">dashboards.</text></g><g id="link_OH_PM"><path d="M691.5 492.849C691.5 528.019 691.5 573.829 691.5 610.599" id="OH-to-PM" stroke="#666666" fill="none"/><path d="M691.5 618.259 694.5 610.259 688.5 610.259 691.5 618.259Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="708" y="571.066">Reads roles and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="692.5" y="586.16">departments of users.</text></g><g id="link_DO_OH"><path d="M408.08 437.109C463.05 437.109 527.96 437.109 581.78 437.109" id="DO-backto-OH" stroke="#666666" fill="none"/><path d="M400.35 437.109 408.35 440.109 408.35 434.109 400.35 437.109Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="417.5" y="430.566">Uses contextualized data.</text></g></g></svg>