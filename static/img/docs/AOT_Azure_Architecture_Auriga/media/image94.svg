<svg width="995" height="564" viewBox="0 0 995 564" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><defs></defs><g><rect x="370.75" y="5" width="240" height="27.6094" id="_title" fill="none"/><text font-family="Arial" font-weight="700" font-size="14" x="375.75" y="24.5332">AOT Reporting - Context diagram</text><g id="elem_operator"><rect x="366" y="72.1094" rx="2.5" ry="2.5" width="87" height="88.125" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="385.5" y="82.1094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="376" y="146.719">Operator</text></g><g id="elem_reportConfigurator"><rect x="488.5" y="45.6094" rx="2.5" ry="2.5" width="198" height="140.953" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="563.5" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="510.5" y="120.219">Report configurator.</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="585.5" y="138.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="498.5" y="155.877">A subject matter expert who</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="528" y="173.486">configures reports.</text></g><g id="elem_reporting"><rect x="395.5" y="263.609" rx="2.5" ry="2.5" width="206" height="75.3438" stroke="#3C7FC0" stroke-width="0.5" fill="#87905C"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="442" y="290.219">AOT Reporting</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="496.5" y="308.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="405.5" y="325.877">Reporting system within AOT.</text></g><g id="elem_OH"><rect x="7" y="439.109" rx="2.5" ry="2.5" width="219" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#BD0000"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="17" y="465.719">AOT Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="114.5" y="483.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="21" y="501.377">Displays operations hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="23" y="518.986">and provides details for each</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="49.5" y="536.596">node in the hierarchy</text></g><g id="elem_smartKPIs"><rect x="261.5" y="430.609" rx="2.5" ry="2.5" width="220" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#6F8100"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="310.5" y="457.219">AOT Smart KPIs</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="369.5" y="475.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="273" y="492.877">Allows users to view KPIs about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="271.5" y="510.486">their Operations configured into</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="278.5" y="528.096">a hierarchy, to drill down and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="334" y="545.705">do analysis.</text></g><g id="elem_IA"><rect x="516.5" y="439.109" rx="2.5" ry="2.5" width="220" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#00B1CD"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="539.5" y="465.719">AOT Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="624.5" y="483.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="553.5" y="501.377">Creates insigths about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="526.5" y="518.986">business operations and makes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="549" y="536.596">them available for users.</text></g><g id="elem_PM"><rect x="771.5" y="439.109" rx="2.5" ry="2.5" width="218" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#81006F"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="784.5" y="465.719">AOT People Management</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="878.5" y="483.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="801.5" y="501.377">Manages AOT roles and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="781.5" y="518.986">departments and assigns them</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="799" y="536.596">to users and user groups.</text></g><g id="link_operator_reporting"><path d="M422.01 160.339C429.27 182.799 439.37 210.349 451.5 233.609 455.42 241.129 460.09 248.779 464.93 256.079" id="operator-to-reporting" stroke="#666666" fill="none"/><path d="M469.82 262.249 467.8 253.947 462.84 257.323 469.82 262.249Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="452.5" y="230.066">Checks reports.</text></g><g id="link_reportConfigurator_reporting"><path d="M568.17 187.009C562.71 202.739 556.14 219.069 548.5 233.609 544.52 241.189 539.7 248.819 534.65 256.069" id="reportConfigurator-to-reporting" stroke="#666666" fill="none"/><path d="M529.54 262.189 536.645 257.444 531.773 253.942 529.54 262.189Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="556.5" y="230.066">Configures reports.</text></g><g id="link_reporting_OH"><path d="M395.21 331.469C364.68 341.659 331.65 354.189 302.5 368.609 265.7 386.809 227.64 411.249 195.61 433.679" id="reporting-to-OH" stroke="#666666" fill="none"/><path d="M189.44 438.739 197.708 436.584 194.252 431.679 189.44 438.739Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="303.