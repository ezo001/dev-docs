<svg width="742" height="604" viewBox="0 0 742 604" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><defs></defs><g><rect x="254.25" y="5" width="220" height="27.6094" id="_title" fill="none"/><text font-family="Arial" font-weight="700" font-size="14" x="259.25" y="24.5332">AOT DataOps Context diagram</text><g id="elem_DO"><rect x="262.5" y="250.609" rx="2.5" ry="2.5" width="219" height="181" stroke="#3C7FC0" stroke-width="0.5" fill="#4472C4"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="320.5" y="277.219">AOT DataOps</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="370" y="295.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="279" y="312.877">The DataOps system ingests</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="289" y="330.486">data from source systems</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="303" y="348.096">(ETL) and stores in a</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="272.5" y="365.705">knowledge graph. Furthermore,</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="282" y="383.315">it contains the infrastructure</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="272.5" y="400.924">and tooling for contextualization</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="349" y="418.533">as well.</text></g><g id="elem_smartKPIs"><rect x="7" y="45.6094" rx="2.5" ry="2.5" width="220" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#6F8100"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="56" y="72.2188">AOT Smart KPIs</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="115" y="90.2676"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="18.5" y="107.877">Allows users to view KPIs about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="17" y="125.486">their Operations configured into</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="24" y="143.096">a hierarchy, to drill down and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="79.5" y="160.705">do analysis.</text></g><g id="elem_IA"><rect x="262" y="54.1094" rx="2.5" ry="2.5" width="220" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#00B1CD"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="285" y="80.7188">AOT Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="370" y="98.7676"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="299" y="116.377">Creates insigths about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="272" y="133.986">business operations and makes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="294.5" y="151.596">them available for users.</text></g><g id="elem_OH"><rect x="517.5" y="54.1094" rx="2.5" ry="2.5" width="219" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#BD0000"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="527.5" y="80.7188">AOT Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="625" y="98.7676"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="531.5" y="116.377">Displays operations hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="533.5" y="133.986">and provides details for each</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="560" y="151.596">node in the hierarchy</text></g><g id="elem_sourceSystem"><rect x="287" y="523.609" rx="2.5" ry="2.5" width="170" height="75.3438" stroke="#8A8A8A" stroke-width="0.5" fill="#999999"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="309.5" y="550.219">Source Systems</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="370" y="568.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="297" y="585.877">Various source systems</text></g><g id="link_DO_sourceSystem"><path d="M372 431.719C372 460.509 372 491.149 372 515.279" id="DO-to-sourceSystem" stroke="#666666" fill="none"/><path d="M372 523.529 375 515.529 369 515.529 372 523.529Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="373" y="475.066">Reads data to maintain</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="381" y="490.16">the Operations Twin.</text></g><g id="link_smartKPIs_DO"><path d="M184.69 173.729C201.39 189.149 219.28 205.539 236 220.609 244.81 228.549 253.98 236.749 263.21 244.949" id="smartKPIs-to-DO" stroke="#666666" fill="none"/><path d="M269.28 250.339 265.279 242.79 261.302 247.282 269.28 250.339Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="237" y="217.066">Use knowledge graph.</text></g><g id="link_IA_DO"><path d="M372 165.289C372 188.359 372 215.939 372 242.299" id="IA-to-DO" stroke="#666666" fill="none"/><path d="M372 250.429 375 242.429 369 242.429 372 250.429Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="373" y="217.066">Use knowledge graph.</text></g><g id="link_OH_DO"><path d="M568.56 165.179C549.36 182.959 527.85 202.719 508 220.609 499.19 228.549 490.02 236.749 480.79 244.949" id="OH-to-DO" stroke="#666666" fill="none"/><path d="M474.72 250.339 482.698 247.282 478.721 242.79 474.72 250.339Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="525" y="217.066">Use knowledge graph.</text></g></g></svg>