<svg width="994" height="753" viewBox="0 0 994 753" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><defs></defs><g><rect x="345.25" y="5" width="290" height="27.6094" id="_title" fill="none"/><text font-family="Arial" font-weight="700" font-size="14" x="350.25" y="24.5332">AOT Intelligent Advisor Context diagram</text><g id="elem_operator"><rect x="63" y="55.6094" rx="2.5" ry="2.5" width="189" height="158.562" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="133.5" y="65.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="124" y="130.219">Operator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="155.5" y="148.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="73" y="165.877">A user from the enterprise</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="91.5" y="183.486">playing roles in daily</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="122" y="201.096">operations.</text></g><g id="elem_IAConfigurator"><rect x="287" y="45.6094" rx="2.5" ry="2.5" width="205" height="178.688" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="365.5" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="319" y="120.219">Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="341" y="140.344">Configurator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="387.5" y="158.393"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="300.5" y="176.002">A subject matter expert who</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="297" y="193.611">configures insight categories</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="343" y="211.221">and templates.</text></g><g id="elem_IA"><rect x="395.5" y="366.609" rx="2.5" ry="2.5" width="220" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#00B1CD"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="418.5" y="393.219">AOT Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="503.5" y="411.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="432.5" y="428.877">Creates insigths about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="405.5" y="446.486">business operations and makes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="428" y="464.096">them available for users.</text></g><g id="elem_smartKPIs"><rect x="14.5" y="619.609" rx="2.5" ry="2.5" width="220" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#6F8100"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="63.5" y="646.219">AOT Smart KPIs</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="122.5" y="664.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="26" y="681.877">Allows users to view KPIs about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="24.5" y="699.486">their Operations configured into</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="31.5" y="717.096">a hierarchy, to drill down and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="87" y="734.705">do analysis.</text></g><g id="elem_3DVisualizer"><rect x="527.5" y="71.1094" rx="2.5" ry="2.5" width="188" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#313139"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="553" y="97.7188">AOT 3D Visualizer</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="619.5" y="115.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="539" y="133.377">Visualizes facilities and/or</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="537.5" y="150.986">processes in 3D providing</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="553" y="168.596">context data from the</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="568" y="186.205">Operations Twin.</text></g><g id="elem_PM"><rect x="269.5" y="628.109" rx="2.5" ry="2.5" width="218" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#81006F"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="282.5" y="654.719">AOT People Management</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="376.5" y="672.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="299.5" y="690.377">Manages AOT roles and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="279.5" y="707.986">departments and assigns them</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="297" y="725.596">to users and user groups.</text></g><g id="elem_OH"><rect x="523" y="628.109" rx="2.5" ry="2.5" width="219" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#BD0000"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="533" y="654.719">AOT Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="630.5" y="672.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="537" y="690.377">Displays operations hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="539" y="707.986">and provides details for each</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="565.5" y="725.596">node in the hierarchy</text></g><g id="elem_DO"><rect x="7" y="331.609" rx="2.5" ry="2.5" width="219" height="181" stroke="#3C7FC0" stroke-width="0.5" fill="#4472C4"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="65" y="358.219">AOT DataOps</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="114.5" y="376.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="23.5" y="393.877">The DataOps system ingests</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="33.5" y="411.486">data from source systems</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="47.5" y="429.096">(ETL) and stores in a</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="17" y="446.705">knowledge graph. Furthermore,</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="26.5" y="464.315">it contains the infrastructure</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="17" y="481.924">and tooling for contextualization</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="93.5" y="499.533">as well.</text></g><g id="elem_reporting"><rect x="750.5" y="97.6094" rx="2.5" ry="2.5" width="206" height="75.3438" stroke="#3C7FC0" stroke-width="0.5" fill="#87905C"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="797" y="124.219">AOT Reporting</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="851.5" y="142.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="760.5" y="159.877">Reporting system within AOT.</text></g><g id="elem_SAPPM"><rect x="777" y="637.109" rx="2.5" ry="2.5" width="203" height="92.9531" stroke="#8A8A8A" stroke-width="0.5" fill="#999999"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="848" y="663.719">SAP PM</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="876.5" y="681.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="787" y="699.377">Manages Plant Maintenance</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="851.5" y="716.986">activities</text></g><g id="elem_ML"><rect x="780.5" y="366.609" rx="2.5" ry="2.5" width="208" height="110.562" stroke="#8A8A8A" stroke-width="0.5" fill="#999999"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="857.5" y="393.219">MLOps</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="882.5" y="411.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="797" y="428.877">Create infrastructure, train,</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="790.5" y="446.486">evaluate, register and deploy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="865.5" y="464.096">model</text></g><g id="link_operator_IA"><path d="M198.86 214.979C217.26 244.779 241.01 277.329 268.5 301.609 303.28 332.329 347.37 357.369 388.06 376.449" id="operator-to-IA" stroke="#666666" fill="none"/><path d="M395.36 379.819 389.354 373.742 386.839 379.19 395.36 379.819Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="287" y="268.066">Views Insights and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="271" y="283.16">actions, analyzes insight</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="269.5" y="298.254">details and takes actions.</text></g><g id="link_IAConfigurator_IA"><path d="M413.3 224.879C421 250.049 430.23 277.229 440.5 301.609 448.59 320.829 458.83 340.999 468.78 359.179" id="IAConfigurator-to-IA" stroke="#666666" fill="none"/><path d="M472.72 366.309 471.474 357.857 466.223 360.761 472.72 366.309Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="441.5" y="268.066">Configures deploys and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="457" y="283.16">configures Insight</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="457.5" y="298.254">generator models.</text></g><g id="link_IA_smartKPIs"><path d="M395.49 469.209C353.44 489.069 306.12 514.269 266.5 542.609 237.83 563.119 209.5 589.469 185.77 613.759" id="IA-to-smartKPIs" stroke="#666666" fill="none"/><path d="M180.16 619.559 187.879 615.896 183.567 611.724 180.16 619.559Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="269" y="556.066">Consumes events and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="267.5" y="571.16">information about KPIs</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="267.5" y="586.254">and KPI Configurations.</text></g><g id="link_IA_OH"><path d="M532.28 477.829C552.71 519.569 580.87 577.109 602.14 620.569" id="IA-to-OH" stroke="#666666" fill="none"/><path d="M605.76 627.969 604.94 619.465 599.55 622.101 605.76 627.969Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="584.5" y="563.566">Reads Operations</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="608" y="578.66">Hierarchy.</text></g><g id="link_IA_PM"><path d="M466.52 477.789C453.4 497.619 439.35 520.579 428.5 542.609 416.41 567.159 405.76 595.389 397.42 620.039" id="IA-to-PM" stroke="#666666" fill="none"/><path d="M394.8 627.899 400.176 621.259 394.484 619.361 394.8 627.899Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="445" y="563.566">Reads roles and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="429.5" y="578.66">departments of users.</text></g><g id="link_3DVisualizer_IA"><path d="M611.83 199.399C605.71 230.929 596.3 269.139 582.5 301.609 574.1 321.359 562.53 341.479 550.9 359.439" id="3DVisualizer-to-IA" stroke="#666666" fill="none"/><path d="M546.28 366.479 553.184 361.446 548.172 358.147 546.28 366.479Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="598.5" y="275.566">Retrieves insights and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="606.5" y="290.66">actions information.</text></g><g id="link_reporting_IA"><path d="M834.39 172.879C814.05 209.229 778.96 264.639 736.5 301.609 703.3 330.519 661.88 354.739 623.32 373.649" id="reporting-to-IA" stroke="#666666" fill="none"/><path d="M615.65 377.369 624.158 376.584 621.543 371.183 615.65 377.369Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="778.5" y="275.566">Retrieves insights and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="786.5" y="290.66">actions information.</text></g><g id="link_DO_IA"><path d="M234.29 422.109C285.47 422.109 345.1 422.109 395.38 422.109" id="DO-backto-IA" stroke="#666666" fill="none"/><path d="M226.15 422.109 234.15 425.109 234.15 419.109 226.15 422.109Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="244.25" y="400.566">Uses knowledge graph</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="296.75" y="415.66">data.</text></g><g id="link_IA_SAPPM"><path d="M598.09 477.679C630.35 497.409 666.47 520.329 698.5 542.609 738.89 570.699 782.48 604.509 816.65 631.859" id="IA-to-SAPPM" stroke="#666666" fill="none"/><path d="M822.91 636.889 818.552 629.541 814.794 634.219 822.91 636.889Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="759.5" y="571.066">Creates Workorder.</text></g><g id="link_IA_ML"><path d="M615.63 422.109C664.8 422.109 722.67 422.109 772.1 422.109" id="IA-to-ML" stroke="#666666" fill="none"/><path d="M780.28 422.109 772.28 419.109 772.28 425.109 780.28 422.109Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="634" y="400.566">Executes ML model to</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="646" y="415.66">create predictions</text></g></g></svg>