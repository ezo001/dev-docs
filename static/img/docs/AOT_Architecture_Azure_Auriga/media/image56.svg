<svg width="1154" height="716" viewBox="0 0 1154 716" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><defs></defs><g><rect x="452.25" y="5" width="236" height="27.6094" id="_title" fill="none"/><text font-family="Arial" font-weight="700" font-size="14" x="457.25" y="24.5332">AOT Smart KPIs Context diagram</text><g id="elem_operator"><rect x="7" y="45.6094" rx="2.5" ry="2.5" width="189" height="158.562" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="77.5" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="68" y="120.219">Operator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="99.5" y="138.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="17" y="155.877">A user from the enterprise</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="35.5" y="173.486">playing roles in daily</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="66" y="191.096">operations.</text></g><g id="elem_smartKPIConfigurator"><rect x="231.5" y="45.6094" rx="2.5" ry="2.5" width="198" height="158.562" stroke="#073B6F" stroke-width="0.5" fill="#08427B"/><image x="306.5" y="55.6094" width="48" height="48" xlink:href="data:image/png;base64,"></image><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="242" y="120.219">Smart KPI Configurator</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="328.5" y="138.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="241.5" y="155.877">A subject matter expert who</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="265.5" y="173.486">configures KPIs and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="284" y="191.096">dependencies.</text></g><g id="elem_smartKPIs"><rect x="464.5" y="353.109" rx="2.5" ry="2.5" width="220" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#6F8100"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="513.5" y="379.719">AOT Smart KPIs</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="572.5" y="397.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="476" y="415.377">Allows users to view KPIs about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="474.5" y="432.986">their Operations configured into</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="481.5" y="450.596">a hierarchy, to drill down and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="537" y="468.205">do analysis.</text></g><g id="elem_peopleManagement"><rect x="338.5" y="599.609" rx="2.5" ry="2.5" width="218" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#81006F"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="351.5" y="626.219">AOT People Management</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="445.5" y="644.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="368.5" y="661.877">Manages AOT roles and</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="348.5" y="679.486">departments and assigns them</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="366" y="697.096">to users and user groups.</text></g><g id="elem_intelligentAdvisor"><rect x="464.5" y="69.6094" rx="2.5" ry="2.5" width="220" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#00B1CD"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="487.5" y="96.2188">AOT Intelligent Advisor</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="572.5" y="114.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="501.5" y="131.877">Creates insigths about</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="474.5" y="149.486">business operations and makes</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="497" y="167.096">them available for users.</text></g><g id="elem_3DVisualizer"><rect x="719.5" y="61.1094" rx="2.5" ry="2.5" width="188" height="128.172" stroke="#3C7FC0" stroke-width="0.5" fill="#313139"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="745" y="87.7188">AOT 3D Visualizer</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="811.5" y="105.768"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="731" y="123.377">Visualizes facilities and/or</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="729.5" y="140.986">processes in 3D providing</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="745" y="158.596">context data from the</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="760" y="176.205">Operations Twin.</text></g><g id="elem_OH"><rect x="592" y="599.609" rx="2.5" ry="2.5" width="219" height="110.562" stroke="#3C7FC0" stroke-width="0.5" fill="#BD0000"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="602" y="626.219">AOT Operations Hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="699.5" y="644.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="606" y="661.877">Displays operations hierarchy</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="608" y="679.486">and provides details for each</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="634.5" y="697.096">node in the hierarchy</text></g><g id="elem_reporting"><rect x="942.5" y="87.6094" rx="2.5" ry="2.5" width="206" height="75.3438" stroke="#3C7FC0" stroke-width="0.5" fill="#87905C"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="989" y="114.219">AOT Reporting</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="1043.5" y="132.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="952.5" y="149.877">Reporting system within AOT.</text></g><g id="elem_DO"><rect x="76" y="326.609" rx="2.5" ry="2.5" width="219" height="181" stroke="#3C7FC0" stroke-width="0.5" fill="#4472C4"/><text fill="#FFFFFF" font-family="Arial" font-weight="700" font-size="16" x="134" y="353.219">AOT DataOps</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="183.5" y="371.268"></text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="92.5" y="388.877">The DataOps system ingests</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="102.5" y="406.486">data from source systems</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="116.5" y="424.096">(ETL) and stores in a</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="86" y="441.705">knowledge graph. Furthermore,</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="95.5" y="459.315">it contains the infrastructure</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="86" y="476.924">and tooling for contextualization</text><text fill="#FFFFFF" font-family="Arial" font-size="14" x="162.5" y="494.533">as well.</text></g><g id="link_operator_smartKPIs"><path d="M149.08 204.819C171.83 236.979 201.53 272.269 235.5 296.609 245.1 303.489 361.96 344.039 455.83 376.029" id="operator-to-smartKPIs" stroke="#666666" fill="none"/><path d="M463.26 378.899 456.659 373.475 454.72 379.153 463.26 378.899Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="236.5" y="255.566">Views KPIs, drills down</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="244.5" y="270.66">and does root cause</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="279" y="285.754">analysis.</text></g><g id="link_smartKPIConfigurator_smartKPIs"><path d="M365.15 204.969C380.56 235.349 400.47 269.279 423.5 296.609 438.66 314.599 456.89 331.719 475.36 347.099" id="smartKPIConfigurator-to-smartKPIs" stroke="#666666" fill="none"/><path d="M481.17 352.689 476.885 345.297 473.081 349.937 481.17 352.689Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="436" y="248.066">Configures KPIs and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="432.5" y="263.16">parameters providing</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="424.5" y="278.254">their calculation formula</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="425" y="293.348">and other dependencies.</text></g><g id="link_smartKPIs_peopleManagement"><path d="M540.47 481.349C522.09 515.499 499.49 557.499 481.17 591.549" id="smartKPIs-to-peopleManagement" stroke="#666666" fill="none"/><path d="M477.09 598.129 483.524 592.508 478.241 589.663 477.09 598.129Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="523" y="551.066">Reads roles and</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="507.5" y="566.16">departments of users.</text></g><g id="link_smartKPIs_OH"><path d="M611.25 481.359C621.54 499.429 632.61 519.209 642.5 537.609 651.81 554.929 661.58 573.879 670.43 591.379" id="smartKPIs-to-OH" stroke="#666666" fill="none"/><path d="M674.43 598.299 673.502 589.806 668.146 592.511 674.43 598.299Z" stroke="#666666" fill="#666666"/><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="659.5" y="551.066">Reads Operations</text><text fill="#666666" font-family="Arial" font-weight="700" font-size="12" x="683" y="566.16">Hierarchy.</text></g><g id="link_intelligentAdvisor_smartKPIs"><path d="M574.5 180.999C574.5 227.079 574.5 293.289 574.5 343.709" id="intelligentAdvisor-to-smartKPIs" stroke="#666666" fill="none"/><path d="M574.5 351.609 577.5 343.609 571.5 343.609 574.5 351.609Z" stroke="#666666" fill="#666666"/><text fill="#666666" 