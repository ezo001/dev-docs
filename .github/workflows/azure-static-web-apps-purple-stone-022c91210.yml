name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      # Set MEDIA_BASE_URL so doc images are served from Azure Blob instead of bundled (keeps build under 500 MB).
      # Optional: set MEDIA_SAS (as a secret) when the container is private and org policy blocks anonymous access.
      # See MEDIA-STORAGE.md for setup.
      MEDIA_BASE_URL: ${{ vars.MEDIA_BASE_URL }}
      MEDIA_SAS: ${{ secrets.MEDIA_SAS }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build (with optional external media URL)
        run: |
          npm ci
          npm run build
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_STONE_022C91210 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # Point to the folder that already contains the built app (index.html, assets, etc.).
          app_location: "build"
          skip_app_build: true
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_STONE_022C91210 }}
          action: "close"
